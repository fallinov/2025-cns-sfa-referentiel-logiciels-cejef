# =============================================================================
# CI Tests — lance lint + typecheck + tests unitaires + Playwright sur PR
# =============================================================================
# Garantit que tout changement merge sur main n'introduit pas de regression.

name: Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Le lint a des erreurs preexistantes (variables non utilisees dans
        # composants legacy) qui ne sont pas regressions. On loggue mais on
        # ne fait pas echouer la CI tant que ces erreurs ne sont pas nettoyees.
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (avec couverture + seuils)
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e:
    name: Playwright E2E (desktop)
    runs-on: ubuntu-latest
    # Continue-on-error : ne bloque pas la PR si Directus est temporairement
    # injoignable. Les unit tests sont la garde principale.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (desktop)
        run: npm run test:e2e:desktop
        env:
          DIRECTUS_URL: http://46.140.144.167:8055

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
